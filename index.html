<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>仙途·墨渊 - P0 Prototype</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main id="app">
      <canvas id="game" width="1280" height="720" aria-label="仙途墨渊游戏画面"></canvas>

      <section id="menu" class="screen active">
        <div class="title-block">
          <p class="kicker">P0 可玩原型</p>
          <h1>仙途·墨渊</h1>
          <p class="subtitle">2D俯视角动作 Roguelike · 水墨五行构筑</p>
          <button id="startBtn" type="button">开始修行</button>
        </div>
      </section>

      <section id="overlay" class="overlay hidden" aria-live="polite"></section>

      <aside id="codex" class="panel hidden">
        <header>
          <h2>五行盘</h2>
          <button id="closeDisk" type="button" aria-label="关闭五行盘">×</button>
        </header>
        <div id="diskSlots" class="disk"></div>
        <h3>背包</h3>
        <div id="inventory" class="inventory"></div>
        <p id="buildText" class="build-text"></p>
      </aside>
    </main>

    <script src="src/game.js"></script>
  </body>
</html>
